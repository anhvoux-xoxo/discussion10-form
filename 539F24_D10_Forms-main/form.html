<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Survey Form</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>

<body>
<form action="" method="post">
  <fieldset>
    <h3>Travel Experience Survey </h3>

    <!-- Age -->
    <label for="age">What is your age range?</label>
    <select id="age" name="age" required>
      <option value="">Select</option>
      <option>Under 18</option>
      <option>18–24</option>
      <option>25–34</option>
      <option>35–44</option>
      <option>45–54</option>
      <option>55+</option>
    </select>

    <!-- Occupation -->
    <label for="occupation">What is your occupation?</label>
    <input type="text" id="occupation" name="occupation" required>

    <!-- Travel Frequency -->
    <div class="radio-group">
      <p>How often do you travel?</p>
      
      <input type="radio" id="rarely" name="travel-frequency">
      <label for="rarely">Rarely</label>

      <input type="radio" id="occasionally" name="travel-frequency">
      <label for="occasionally">Occasionally</label>

      <input type="radio" id="frequently" name="travel-frequency">
      <label for="frequently">Frequently</label>

      <input type="radio" id="very-frequently" name="travel-frequency">
      <label for="very-frequently">Very frequently</label>
    </div>

    <!-- Group Size -->
    <label for="group-size">How many people do you usually travel with?</label>
    <select id="group-size" name="group-size">
      <option>I travel alone</option>
      <option>1–2 people</option>
      <option>3–5 people</option>
      <option>6+ people</option>
    </select>

    <!-- Trip Rating -->
    <div class="radio-group">
      <p>How would you rate your most recent trip?</p>

      <input type="radio" id="poor" name="rating">
      <label for="poor">Poor</label>

      <input type="radio" id="neutral" name="rating">
      <label for="neutral">Neutral</label>

      <input type="radio" id="good" name="rating">
      <label for="good">Good</label>

      <input type="radio" id="excellent" name="rating">
      <label for="excellent">Excellent</label>
    </div>

    <!-- Same itinerary -->
    <div class="radio-group">
      <p>Would you use the same itinerary again?</p>

      <input type="radio" id="yes" name="same-itinerary">
      <label for="yes">Yes</label>

      <input type="radio" id="no" name="same-itinerary">
      <label for="no">No</label>

      <input type="radio" id="maybe" name="same-itinerary">
      <label for="maybe">Maybe</label>
    </div>

    <!-- Keep itinerary -->
    <div class="radio-group">
      <p>Do you keep your itinerary after your trip?</p>

      <input type="radio" id="always" name="keep-itinerary">
      <label for="always">Always</label>

      <input type="radio" id="sometimes" name="keep-itinerary">
      <label for="sometimes">Sometimes</label>

      <input type="radio" id="never" name="keep-itinerary">
      <label for="never">Never</label>
    </div>

    <!-- Sharing method -->
    <label for="sharing">How do you usually share your itinerary with friends?</label>
    <input type="text" id="sharing" name="sharing" placeholder="e.g. text, social media, email">

    <input type="submit" value="Submit">
  </fieldset>
</form>
</body>
</html>
